name: Release rune CLI

# Workflow creates a prerelease when any `v*` tag is pushed; maintainer
# later promotes prerelease to release via GitHub

on:
  push:
    tags:
      - 'v*' # trigger on version tags
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing git tag to build from (e.g. v0.4.0)'
        required: true
        type: string
      dry_run:
        description: 'Build and smoke-test but skip publishing prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write # softprops/action-gh-release

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    os: linux,   arch: amd64 }
          - { runner: ubuntu-24.04-arm, os: linux,   arch: arm64 }
          - { runner: macos-14,         os: darwin,  arch: arm64 }
          - { runner: macos-14,         os: darwin,  arch: amd64 }
          - { runner: windows-latest,   os: windows, arch: amd64 }
    steps:
      # Setup
      - name: Resolve version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION for ${{ matrix.os }}/${{ matrix.arch }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.version }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Build and test
      - name: Build binary
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/manifest.json
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          ASSET="rune-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.runeVersion=${VERSION} -X main.manifestURL=${MANIFEST_URL}" \
            -o "dist/${ASSET}" \
            ./cmd/rune
          ls -lh "dist/${ASSET}"

      - name: Test
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          BIN="./dist/rune-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          chmod +x "$BIN" 2>/dev/null || true
          OUT="$("$BIN" version)"
          echo "$OUT"
          case "$OUT" in
            *"$VERSION"*) echo "test ok" ;;
            *) echo "::error::version $VERSION not found in output: $OUT" >&2; exit 1 ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rune-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/rune-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # softprops/action-gh-release
    steps:
      - name: Resolve version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.version }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: List and checksum
        run: |
          ls -lh dist/
          (cd dist && sha256sum rune-* > checksums.txt)
          cat dist/checksums.txt

      - name: Verify pinned releases existency
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUNE_MCP_VERSION=$(awk '/^rune_mcp_version:/ {print $2}' .release-pins.yaml)
          RUNED_VERSION=$(awk    '/^runed_version:/    {print $2}' .release-pins.yaml)
          if [ -z "${RUNE_MCP_VERSION:-}" ] || [ -z "${RUNED_VERSION:-}" ]; then
            echo "::error::missing pin in .release-pins.yaml (rune_mcp_version=${RUNE_MCP_VERSION:-}, runed_version=${RUNED_VERSION:-})" >&2
            exit 1
          fi
          echo "Checking pinned releases: rune-mcp=${RUNE_MCP_VERSION}, runed=${RUNED_VERSION}"

          fail=0
          if ! gh release view "${RUNE_MCP_VERSION}" --repo CryptoLabInc/rune-mcp >/dev/null 2>&1; then
            echo "::error::rune-mcp ${RUNE_MCP_VERSION} (pinned in .release-pins.yaml) is not published. Release it before tagging rune, or bump the pin." >&2
            fail=1
          fi
          if ! gh release view "${RUNED_VERSION}" --repo CryptoLabInc/runed >/dev/null 2>&1; then
            echo "::error::runed ${RUNED_VERSION} (pinned in .release-pins.yaml) is not published. Release it before tagging rune, or bump the pin." >&2
            fail=1
          fi
          
          [ "$fail" -eq 0 ] || exit 1
          echo "Both pinned releases are published."

      - name: Generate manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          RUNE_MCP_VERSION=$(awk '/^rune_mcp_version:/ {print $2}' .release-pins.yaml)
          RUNED_VERSION=$(awk    '/^runed_version:/    {print $2}' .release-pins.yaml)
          if [ -z "${RUNE_MCP_VERSION:-}" ] || [ -z "${RUNED_VERSION:-}" ]; then
            echo "::error::missing pin in .release-pins.yaml (rune_mcp_version=${RUNE_MCP_VERSION}, runed_version=${RUNED_VERSION})" >&2
            exit 1
          fi
          echo "Pinning rune-mcp=${RUNE_MCP_VERSION}, runed=${RUNED_VERSION}"

          mkdir -p _downstream/runed _downstream/rune-mcp

          # runed
          gh release download "${RUNED_VERSION}" \
            --repo CryptoLabInc/runed \
            --pattern '*.sha256' \
            --dir _downstream/runed

          # rune-mcp
          gh release download "${RUNE_MCP_VERSION}" \
            --repo CryptoLabInc/rune-mcp \
            --pattern 'checksums.txt' \
            --dir _downstream/rune-mcp

          runed_sha() {
            local os=$1 arch=$2
            awk '{print $1}' "_downstream/runed/runed-${RUNED_VERSION}-${os}-${arch}.tar.gz.sha256"
          }
          runemcp_sha() {
            local os=$1 arch=$2
            awk -v f="rune-mcp-${os}-${arch}" '$2 == f {print $1}' "_downstream/rune-mcp/checksums.txt"
          }

          RUNED_BASE="https://github.com/CryptoLabInc/runed/releases/download/${RUNED_VERSION}"
          MCP_BASE="https://github.com/CryptoLabInc/rune-mcp/releases/download/${RUNE_MCP_VERSION}"

          mkdir -p dist
          cat > dist/manifest.json <<EOF
          {
            "version": 1,
            "rune_mcp_version": "${RUNE_MCP_VERSION}",
            "runed_version": "${RUNED_VERSION}",
            "platforms": {
              "darwin-arm64": {
                "runed": {
                  "url":     "${RUNED_BASE}/runed-${RUNED_VERSION}-darwin-arm64.tar.gz",
                  "sha256":  "$(runed_sha darwin arm64)",
                  "extract": "tar.gz"
                },
                "rune_mcp": {
                  "url":    "${MCP_BASE}/rune-mcp-darwin-arm64",
                  "sha256": "$(runemcp_sha darwin arm64)"
                }
              },
              "linux-amd64": {
                "runed": {
                  "url":     "${RUNED_BASE}/runed-${RUNED_VERSION}-linux-amd64.tar.gz",
                  "sha256":  "$(runed_sha linux amd64)",
                  "extract": "tar.gz"
                },
                "rune_mcp": {
                  "url":    "${MCP_BASE}/rune-mcp-linux-amd64",
                  "sha256": "$(runemcp_sha linux amd64)"
                }
              },
              "linux-arm64": {
                "runed": {
                  "url":     "${RUNED_BASE}/runed-${RUNED_VERSION}-linux-arm64.tar.gz",
                  "sha256":  "$(runed_sha linux arm64)",
                  "extract": "tar.gz"
                },
                "rune_mcp": {
                  "url":    "${MCP_BASE}/rune-mcp-linux-arm64",
                  "sha256": "$(runemcp_sha linux arm64)"
                }
              }
            }
          }
          EOF

          # Validate JSON
          jq . dist/manifest.json > /dev/null
          cat dist/manifest.json

      - name: Publish prerelease
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: rune CLI ${{ steps.version.outputs.version }}
          prerelease: true
          files: |
            dist/rune-linux-amd64
            dist/rune-linux-arm64
            dist/rune-darwin-amd64
            dist/rune-darwin-arm64
            dist/rune-windows-amd64.exe
            dist/checksums.txt
            dist/manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
