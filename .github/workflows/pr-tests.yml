name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-tests:
    name: Detect changed test files
    runs-on: ubuntu-latest
    outputs:
      test_files: ${{ steps.detect.outputs.test_files }}
      has_tests: ${{ steps.detect.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed test files
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '(^|/)tests/test_[^/]+\.py$' || true)

          echo "Changed test files:"
          echo "$CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_files=" >> "$GITHUB_OUTPUT"
          else
            FILES=$(echo "$CHANGED" | tr '\n' ' ' | sed 's/ $//')
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_files=$FILES" >> "$GITHUB_OUTPUT"
          fi

  run-tests:
    name: Run changed tests
    needs: detect-changed-tests
    if: needs.detect-changed-tests.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run changed tests
        id: pytest
        run: |
          python -m pytest ${{ needs.detect-changed-tests.outputs.test_files }} \
            -v --tb=long \
            2>&1 | tee pytest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVECTOR_API_KEY: ${{ secrets.ENVECTOR_API_KEY }}
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rawOutput = fs.readFileSync('pytest_output.txt', 'utf8');
            const exitCode = '${{ steps.pytest.outputs.exit_code }}';
            const passed = exitCode === '0';
            const status = passed ? '✅ All tests passed' : '❌ Some tests failed';

            const testFiles = `${{ needs.detect-changed-tests.outputs.test_files }}`
              .trim().split(' ').filter(Boolean)
              .map(f => `- \`${f}\``).join('\n');

            // Trim output to avoid hitting comment size limits
            const MAX = 10000;
            const output = rawOutput.length > MAX
              ? '...(truncated)\n' + rawOutput.slice(-MAX)
              : rawOutput;

            const marker = '<!-- pr-tests-bot -->';
            const body = [
              marker,
              '## ' + status,
              '',
              '**Test files run:**',
              testFiles,
              '',
              '<details>',
              '<summary>Full test output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1

  no-tests-changed:
    name: No test files changed
    needs: detect-changed-tests
    if: needs.detect-changed-tests.outputs.has_tests == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice
        run: echo "No test files were added or modified in this PR — skipping test run."
