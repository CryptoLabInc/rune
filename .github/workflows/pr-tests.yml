name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-tests:
    name: Detect changed test functions
    runs-on: ubuntu-latest
    outputs:
      test_ids: ${{ steps.detect.outputs.test_ids }}
      has_changed: ${{ steps.detect.outputs.has_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed test node IDs
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '(^|/)tests/test_[^/]+\.py$' || true)

          if [ -z "$CHANGED" ]; then
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
            echo "test_ids=" >> "$GITHUB_OUTPUT"
          else
            python scripts/ci_changed_tests.py "$BASE" "$HEAD" $CHANGED
          fi

  run-tests:
    name: Run all tests
    needs: detect-changed-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all tests
        id: pytest
        run: |
          python -m pytest agents/tests/ mcp/tests/ \
            -v --tb=long \
            2>&1 | tee pytest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVECTOR_API_KEY: ${{ secrets.ENVECTOR_API_KEY }}
        continue-on-error: true

      - name: Detect collection-skipped tests
        if: always()
        run: |
          python -m pytest agents/tests/ mcp/tests/ \
            --collect-only -v --no-header \
            2>&1 | grep -i "skip" | tee pytest_collect_skips.txt || true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rawOutput = fs.readFileSync('pytest_output.txt', 'utf8');
            const collectSkipsOutput = fs.existsSync('pytest_collect_skips.txt')
              ? fs.readFileSync('pytest_collect_skips.txt', 'utf8')
              : '';
            const exitCode = '${{ steps.pytest.outputs.exit_code }}';
            const passed = exitCode === '0';
            const status = passed ? '✅ All tests passed' : '❌ Some tests failed';

            // Parse pytest final summary line for authoritative counts
            // e.g. "4 failed, 261 passed, 2 skipped in 4.06s"
            function parsePytestSummary(output) {
              const lines = output.split('\n');
              for (let i = lines.length - 1; i >= 0; i--) {
                const line = lines[i];
                if (/^=+\s+/.test(line) && /\d+\s+(passed|failed)/.test(line)) {
                  const counts = { passed: 0, failed: 0, error: 0, skipped: 0, xfailed: 0, xpassed: 0 };
                  for (const [, n, k] of line.matchAll(/(\d+)\s+(passed|failed|error|skipped|xfailed|xpassed)/g)) {
                    counts[k] = parseInt(n);
                  }
                  counts.total = Object.values(counts).reduce((a, b) => a + b, 0);
                  return counts;
                }
              }
              return null;
            }

            // Parse collection-skipped test IDs from --collect-only -v output
            // Looks for lines like: "SKIP [1] agents/tests/test_foo.py:5: reason"
            // or "<SkippedItem 'test_name'>" patterns
            function parseCollectionSkipNames(collectOutput) {
              const skipped = [];
              for (const line of collectOutput.split('\n')) {
                const m = line.match(/^SKIP\s+\[\d+\]\s+(\S+):(\d+)(?::\s+(.*))?/);
                if (m) skipped.push({ id: `${m[1]}:${m[2]}`, reason: m[3] || '(no reason given)' });
              }
              return skipped;
            }

            // Parse individual test results from verbose pytest output
            // e.g. "tests/foo.py::TestClass::test_bar PASSED     [ 50%]"
            // e.g. "tests/foo.py::TestClass::test_bar SKIPPED (reason)  [ 50%]"
            const testResults = [];
            for (const line of rawOutput.split('\n')) {
              const m = line.match(/^(\S+::\S+)\s+(PASSED|FAILED|ERROR|SKIPPED|XFAIL|XPASS)(?:\s+\(([^)]*)\))?/);
              if (m) testResults.push({ id: m[1], result: m[2], reason: m[3] || null });
            }

            const pytestSummary = parsePytestSummary(rawOutput);

            // Parse failure detail blocks from the FAILURES section
            // pytest headers use "ClassName.test_method" (dot) not "::"
            const failures = {};
            const lines = rawOutput.split('\n');
            let inFailures = false;
            let currentKey = null;
            let currentLines = [];
            for (const line of lines) {
              if (/^={3,}\s+FAILURES\s+={3,}/.test(line)) {
                inFailures = true;
                continue;
              }
              if (inFailures) {
                const header = line.match(/^_{3,}\s+(.+?)\s+_{3,}$/);
                if (header) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  currentKey = header[1];
                  currentLines = [];
                  continue;
                }
                if (/^={3,}/.test(line)) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  inFailures = false; currentKey = null; currentLines = [];
                  continue;
                }
                if (currentKey) currentLines.push(line);
              }
            }
            if (currentKey) failures[currentKey] = currentLines.join('\n').trim();

            const resultIcon = { PASSED: '✅', FAILED: '❌', ERROR: '💥', SKIPPED: '⏭️', XFAIL: '🔕', XPASS: '⚠️' };
            const reasonById = {};
            for (const t of testResults) {
              if (t.reason) reasonById[t.id] = t.reason;
            }

            // Full Test Results: summary counts + failed + skipped tests
            const failedTests = testResults.filter(t => t.result === 'FAILED' || t.result === 'ERROR');
            const skippedTests = testResults.filter(t => t.result === 'SKIPPED' || t.result === 'XFAIL');
            const totalPass = testResults.filter(t => t.result === 'PASSED').length;
            const totalFail = failedTests.length;
            const totalSkip = skippedTests.length;

            // Detect collection-skipped tests by comparing bot counts vs pytest summary
            const collectionSkipNames = parseCollectionSkipNames(collectSkipsOutput);
            const summarySkipped = pytestSummary ? pytestSummary.skipped : 0;
            const collectionSkipCount = Math.max(0, summarySkipped - totalSkip);

            // Build corrected totals using pytest summary as authoritative source
            const authoritativeTotal = pytestSummary ? pytestSummary.total : testResults.length;
            const correctedTotal = testResults.length + collectionSkipCount;

            // Warn if corrected total still doesn't match summary after reconciliation
            const stillMismatched = pytestSummary && correctedTotal !== authoritativeTotal;

            let tableSection = '';
            if (testResults.length > 0) {
              const correctedSkip = totalSkip + collectionSkipCount;
              const skipPart = correctedSkip > 0 ? `, ${correctedSkip} skipped` : '';
              const summary = `**${totalPass} passed, ${totalFail} failed${skipPart}** (${authoritativeTotal} total)`;
              const notableRows = [
                ...failedTests.map(t => `| ${resultIcon[t.result]} ${t.result} | \`${t.id}\` |`),
                ...skippedTests.map(t => `| ${resultIcon[t.result]} ${t.result} | \`${t.id}\` |`),
                ...(collectionSkipCount > 0
                  ? (collectionSkipNames.length > 0
                      ? collectionSkipNames.map(s => `| ⏭️ SKIPPED (collection) | \`${s.id}\` |`)
                      : [`| ⏭️ SKIPPED (collection) | ${collectionSkipCount} test(s) skipped during collection — names unavailable |`])
                  : []),
              ];
              const notableTable = notableRows.length > 0
                ? ['', '| Result | Test |', '|--------|------|', ...notableRows, ''].join('\n')
                : '';
              tableSection = ['### Full Test Results', '', summary, notableTable].join('\n');
            }

            // Failure details — pytest FAILURES headers use dot notation: "TestClass.test_method"
            const failureSection = failedTests.length > 0
              ? [
                  '---',
                  '### ❌ Failure Details',
                  '',
                  ...failedTests.flatMap(t => {
                    const parts = t.id.split('::').slice(1);
                    const keyDot = parts.join('.');
                    const keyColon = parts.join('::');
                    const detail = failures[keyDot] || failures[keyColon] || failures[t.id] || '(no detail found)';
                    return [
                      `#### \`${t.id}\``,
                      '```',
                      detail,
                      '```',
                      '',
                    ];
                  }),
                ].join('\n')
              : '';

            // Skipped details (execution-time + collection-time)
            const hasAnySkipped = skippedTests.length > 0 || collectionSkipCount > 0;
            const skippedSection = hasAnySkipped
              ? [
                  '---',
                  '### ⏭️ Skipped Details',
                  '',
                  ...skippedTests.flatMap(t => [
                    `#### \`${t.id}\``,
                    reasonById[t.id] || '(no reason given)',
                    '',
                  ]),
                  ...(collectionSkipCount > 0
                    ? (collectionSkipNames.length > 0
                        ? collectionSkipNames.flatMap(s => [
                            `#### \`${s.id}\` _(collection-skipped)_`,
                            s.reason,
                            '',
                          ])
                        : [
                            `#### _(${collectionSkipCount} collection-skipped test(s))_`,
                            'These tests were skipped during pytest collection. Re-run with `--collect-only -v` to inspect.',
                            '',
                          ])
                    : []),
                ].join('\n')
              : '';

            // Warning if test counts still don't reconcile after correction
            const warningSection = stillMismatched
              ? [
                  '---',
                  '### ⚠️ Count Mismatch Warning',
                  '',
                  `pytest reported **${authoritativeTotal} total** tests in its summary, but the reconciled count is **${correctedTotal}**.`,
                  'This may indicate XFAIL/XPASS results or other collection anomalies not reflected above.',
                  '',
                ].join('\n')
              : '';

            const marker = '<!-- pr-tests-bot -->';
            const bodyParts = [
              marker,
              '## ' + status,
              '',
            ];

            if (tableSection) bodyParts.push(tableSection);
            if (failureSection) bodyParts.push(failureSection);
            if (skippedSection) bodyParts.push(skippedSection);
            if (warningSection) bodyParts.push(warningSection);

            const body = bodyParts.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: always() && steps.pytest.outputs.exit_code != '0'
        run: exit 1
