name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  go-tests:
    name: go test + vet + gofmt
    # Skip fork PRs — self-hosted runner must not execute untrusted code.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, rune-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          # Pull the toolchain version from go.mod so the workflow doesn't
          # drift when go.mod's `go` / `toolchain` lines bump.
          go-version-file: go.mod
          # Disable cache: a malicious PR could write to the runner's
          # module/build cache, persisting attacker code into later runs.
          # CI is fast enough on a self-hosted runner without it.
          cache: false

      - name: gofmt (no diff)
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:" >&2
            echo "$diff" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 5m ./...
