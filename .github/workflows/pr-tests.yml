name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-tests:
    name: Detect changed test functions
    runs-on: ubuntu-latest
    outputs:
      test_ids: ${{ steps.detect.outputs.test_ids }}
      has_changed: ${{ steps.detect.outputs.has_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed test node IDs
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '(^|/)tests/test_[^/]+\.py$' || true)

          if [ -z "$CHANGED" ]; then
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
            echo "test_ids=" >> "$GITHUB_OUTPUT"
          else
            python scripts/ci_changed_tests.py "$BASE" "$HEAD" $CHANGED
          fi

  run-tests:
    name: Run all tests
    needs: detect-changed-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all tests
        id: pytest
        run: |
          python -m pytest agents/tests/ mcp/tests/ \
            -v --tb=long \
            2>&1 | tee pytest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVECTOR_API_KEY: ${{ secrets.ENVECTOR_API_KEY }}
        continue-on-error: true

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rawOutput = fs.readFileSync('pytest_output.txt', 'utf8');
            const exitCode = '${{ steps.pytest.outputs.exit_code }}';
            const passed = exitCode === '0';
            const status = passed ? '✅ All tests passed' : '❌ Some tests failed';

            // Parse individual test results from verbose pytest output
            // e.g. "tests/foo.py::TestClass::test_bar PASSED     [ 50%]"
            const testResults = [];
            for (const line of rawOutput.split('\n')) {
              const m = line.match(/^(\S+::\S+)\s+(PASSED|FAILED|ERROR|SKIPPED|XFAIL|XPASS)/);
              if (m) testResults.push({ id: m[1], result: m[2] });
            }

            // Parse failure detail blocks from the FAILURES section
            const failures = {};
            const lines = rawOutput.split('\n');
            let inFailures = false;
            let currentKey = null;
            let currentLines = [];
            for (const line of lines) {
              if (/^={3,}\s+FAILURES\s+={3,}/.test(line)) {
                inFailures = true;
                continue;
              }
              if (inFailures) {
                const header = line.match(/^_{3,}\s+(.+?)\s+_{3,}$/);
                if (header) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  currentKey = header[1];
                  currentLines = [];
                  continue;
                }
                if (/^={3,}/.test(line)) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  inFailures = false; currentKey = null; currentLines = [];
                  continue;
                }
                if (currentKey) currentLines.push(line);
              }
            }
            if (currentKey) failures[currentKey] = currentLines.join('\n').trim();

            // Build results table
            const resultIcon = { PASSED: '✅', FAILED: '❌', ERROR: '💥', SKIPPED: '⏭️', XFAIL: '🔕', XPASS: '⚠️' };
            const tableRows = testResults.map(t =>
              `| \`${t.id}\` | ${resultIcon[t.result] || ''} ${t.result} |`
            );
            const tableSection = testResults.length > 0
              ? [
                  '### Test Results',
                  '',
                  '| Test | Result |',
                  '|------|--------|',
                  ...tableRows,
                  '',
                ].join('\n')
              : '';

            // Build failure details section
            const failedTests = testResults.filter(t => t.result === 'FAILED' || t.result === 'ERROR');
            const failureSection = failedTests.length > 0
              ? [
                  '---',
                  '### ❌ Failure Details',
                  '',
                  ...failedTests.flatMap(t => {
                    // failure key is everything after the file path (e.g. "TestClass::test_bar")
                    const key = t.id.split('::').slice(1).join('::');
                    const detail = failures[key] || failures[t.id] || '(no detail found)';
                    return [
                      `#### \`${t.id}\``,
                      '```',
                      detail,
                      '```',
                      '',
                    ];
                  }),
                ].join('\n')
              : '';

            const hasChanged = '${{ needs.detect-changed-tests.outputs.has_changed }}' === 'true';
            const changedIds = '${{ needs.detect-changed-tests.outputs.test_ids }}'
              .trim().split(' ').filter(Boolean);

            const changedSection = hasChanged
              ? [
                  '---',
                  '### Changed / New Tests in This PR',
                  '',
                  changedIds.map(id => '- `' + id + '`').join('\n'),
                  '',
                ].join('\n')
              : '';

            const MAX = 10000;
            const output = rawOutput.length > MAX
              ? '...(truncated)\n' + rawOutput.slice(-MAX)
              : rawOutput;

            const marker = '<!-- pr-tests-bot -->';
            const parts = [
              marker,
              '## ' + status,
              '',
            ];

            if (changedSection) parts.push(changedSection);
            if (tableSection) parts.push(tableSection);
            if (failureSection) parts.push(failureSection);

            parts.push(
              '---',
              '<details>',
              '<summary>Full test output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            );

            const body = parts.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: always() && steps.pytest.outputs.exit_code != '0'
        run: exit 1
