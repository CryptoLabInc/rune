name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changed-tests:
    name: Detect changed test functions
    runs-on: ubuntu-latest
    outputs:
      test_ids: ${{ steps.detect.outputs.test_ids }}
      has_changed: ${{ steps.detect.outputs.has_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed test node IDs
        id: detect
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '(^|/)tests/test_[^/]+\.py$' || true)

          if [ -z "$CHANGED" ]; then
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
            echo "test_ids=" >> "$GITHUB_OUTPUT"
          else
            python scripts/ci_changed_tests.py "$BASE" "$HEAD" $CHANGED
          fi

  run-tests:
    name: Run all tests
    needs: detect-changed-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run all tests
        id: pytest
        run: |
          python -m pytest agents/tests/ mcp/tests/ \
            -v --tb=long \
            2>&1 | tee pytest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVECTOR_API_KEY: ${{ secrets.ENVECTOR_API_KEY }}
        continue-on-error: true

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rawOutput = fs.readFileSync('pytest_output.txt', 'utf8');
            const exitCode = '${{ steps.pytest.outputs.exit_code }}';
            const passed = exitCode === '0';
            const status = passed ? '✅ All tests passed' : '❌ Some tests failed';

            // Parse individual test results from verbose pytest output
            // e.g. "tests/foo.py::TestClass::test_bar PASSED     [ 50%]"
            // e.g. "tests/foo.py::TestClass::test_bar SKIPPED (reason)  [ 50%]"
            const testResults = [];
            for (const line of rawOutput.split('\n')) {
              const m = line.match(/^(\S+::\S+)\s+(PASSED|FAILED|ERROR|SKIPPED|XFAIL|XPASS)(?:\s+\(([^)]*)\))?/);
              if (m) testResults.push({ id: m[1], result: m[2], reason: m[3] || null });
            }

            // Parse failure detail blocks from the FAILURES section
            // pytest headers use "ClassName.test_method" (dot) not "::"
            const failures = {};
            const lines = rawOutput.split('\n');
            let inFailures = false;
            let currentKey = null;
            let currentLines = [];
            for (const line of lines) {
              if (/^={3,}\s+FAILURES\s+={3,}/.test(line)) {
                inFailures = true;
                continue;
              }
              if (inFailures) {
                const header = line.match(/^_{3,}\s+(.+?)\s+_{3,}$/);
                if (header) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  currentKey = header[1];
                  currentLines = [];
                  continue;
                }
                if (/^={3,}/.test(line)) {
                  if (currentKey) failures[currentKey] = currentLines.join('\n').trim();
                  inFailures = false; currentKey = null; currentLines = [];
                  continue;
                }
                if (currentKey) currentLines.push(line);
              }
            }
            if (currentKey) failures[currentKey] = currentLines.join('\n').trim();

            const resultIcon = { PASSED: '✅', FAILED: '❌', ERROR: '💥', SKIPPED: '⏭️', XFAIL: '🔕', XPASS: '⚠️', 'NOT RUN': '⚪' };
            const resultById = {};
            const reasonById = {};
            for (const t of testResults) {
              resultById[t.id] = t.result;
              if (t.reason) reasonById[t.id] = t.reason;
            }

            // Updated Tests in this PR — per-test PASS/FAIL and summary
            const hasChanged = '${{ needs.detect-changed-tests.outputs.has_changed }}' === 'true';
            const changedIds = '${{ needs.detect-changed-tests.outputs.test_ids }}'
              .trim().split(' ').filter(Boolean);

            // For parameterized tests, ci_changed_tests.py outputs the base function name
            // (e.g. "test_foo") but pytest IDs include params (e.g. "test_foo[param1-param2]").
            // Resolve a changed ID to its aggregate result across all matching param variants.
            const resolveResult = (id) => {
              if (resultById[id]) return resultById[id];
              const prefix = id + '[';
              const variants = testResults.filter(t => t.id.startsWith(prefix));
              if (variants.length === 0) return 'NOT RUN';
              if (variants.some(t => t.result === 'FAILED' || t.result === 'ERROR')) return 'FAILED';
              if (variants.every(t => t.result === 'PASSED')) return 'PASSED';
              if (variants.every(t => t.result === 'SKIPPED' || t.result === 'XFAIL')) return 'SKIPPED';
              return variants[0].result;
            };

            let changedSection = '';
            if (hasChanged && changedIds.length > 0) {
              const changedPass = changedIds.filter(id => resolveResult(id) === 'PASSED').length;
              const changedRows = changedIds.map(id => {
                const res = resolveResult(id);
                return `| ${resultIcon[res]} ${res} | \`${id}\` |`;
              });
              changedSection = [
                '### Updated Tests in this PR',
                '',
                `**${changedPass} / ${changedIds.length} passed**`,
                '',
                '| Result | Test |',
                '|--------|------|',
                ...changedRows,
                '',
              ].join('\n');
            }

            // Full suite results: summary counts + failed + skipped tests
            const failedTests = testResults.filter(t => t.result === 'FAILED' || t.result === 'ERROR');
            const skippedTests = testResults.filter(t => t.result === 'SKIPPED' || t.result === 'XFAIL');
            const totalPass = testResults.filter(t => t.result === 'PASSED').length;
            const totalFail = failedTests.length;
            const totalSkip = skippedTests.length;

            let tableSection = '';
            if (testResults.length > 0) {
              const skipPart = totalSkip > 0 ? `, ${totalSkip} skipped` : '';
              const summary = `**${totalPass} passed, ${totalFail} failed${skipPart}** (${testResults.length} total)`;
              const notableRows = [
                ...failedTests.map(t => `| ${resultIcon[t.result]} ${t.result} | \`${t.id}\` |`),
                ...skippedTests.map(t => `| ${resultIcon[t.result]} ${t.result} | \`${t.id}\` |`),
              ];
              const notableTable = notableRows.length > 0
                ? ['', '| Result | Test |', '|--------|------|', ...notableRows, ''].join('\n')
                : '';
              tableSection = ['### Full Suite Results', '', summary, notableTable].join('\n');
            }

            // Failure details — pytest FAILURES headers use dot notation: "TestClass.test_method"
            const failureSection = failedTests.length > 0
              ? [
                  '---',
                  '### ❌ Failure Details',
                  '',
                  ...failedTests.flatMap(t => {
                    const parts = t.id.split('::').slice(1);
                    const keyDot = parts.join('.');
                    const keyColon = parts.join('::');
                    const detail = failures[keyDot] || failures[keyColon] || failures[t.id] || '(no detail found)';
                    return [
                      `#### \`${t.id}\``,
                      '```',
                      detail,
                      '```',
                      '',
                    ];
                  }),
                ].join('\n')
              : '';

            // Skipped details
            const skippedSection = skippedTests.length > 0
              ? [
                  '---',
                  '### ⏭️ Skipped Details',
                  '',
                  ...skippedTests.flatMap(t => [
                    `#### \`${t.id}\``,
                    reasonById[t.id] || '(no reason given)',
                    '',
                  ]),
                ].join('\n')
              : '';

            const marker = '<!-- pr-tests-bot -->';
            const bodyParts = [
              marker,
              '## ' + status,
              '',
            ];

            if (changedSection) bodyParts.push(changedSection);
            if (tableSection) bodyParts.push(tableSection);
            if (failureSection) bodyParts.push(failureSection);
            if (skippedSection) bodyParts.push(skippedSection);

            const body = bodyParts.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: always() && steps.pytest.outputs.exit_code != '0'
        run: exit 1
