name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  go-tests:
    name: go test + vet + gofmt
    runs-on: [self-hosted, rune-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: gofmt (no diff)
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:" >&2
            echo "$diff" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        id: gotest
        run: |
          go test -race -timeout 5m ./... 2>&1 | tee gotest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Save PR info
        if: always()
        run: |
          cat > pr_info.json <<EOF
          {
            "PR_NUMBER": "${{ github.event.pull_request.number }}",
            "EXIT_CODE": "${{ steps.gotest.outputs.exit_code }}",
            "HEAD_SHA": "${{ github.event.pull_request.head.sha }}",
            "HAS_CHANGED": "false",
            "TEST_IDS": ""
          }
          EOF

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            gotest_output.txt
            pr_info.json

      - name: Fail if tests failed
        if: always() && steps.gotest.outputs.exit_code != '0'
        run: exit 1
