name: CI

on:
  push:
    branches: [main, feat/go-migration]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: [self-hosted, rune-ci]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l -e .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            gofmt -d -e .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...
