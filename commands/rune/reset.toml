description = "Clear Rune configuration and return to dormant state"
prompt = """
You are resetting Rune, an FHE-encrypted organizational memory system.

Follow these steps:

1. **Confirm with user** before proceeding. Ask: "This will delete your Rune configuration. Continue?"

2. If confirmed:
   - Delete `~/.rune/config.json`
   - Respond: "Configuration cleared. Run `/rune:configure` (or `$rune configure` for Codex CLI) to set up again."

3. If not confirmed:
   - Respond: "Reset cancelled."

User input: {{input}}
"""
