# TODO(v0.4 migration): v0.3-stale, bootstrap-mcp.sh runtime block removed (script deleted); rest still uses envector.* fields + python mcp check.
# Regenerate from commands/claude/activate.md before re-enabling Codex/Gemini.
description = "Activate Rune by validating infrastructure and setting state to active"
prompt = """
You are activating Rune, an FHE-encrypted organizational memory system.

Follow these steps:

1. Read `~/.rune/config.json`. If it does not exist, respond:
   "Not configured. Run `/rune:configure` first." and stop.

2. Verify required fields exist: `vault.endpoint`, `vault.token`, `envector.endpoint`, `envector.api_key`.
   If any are missing or empty, show what is missing and suggest `/rune:configure` (or `$rune configure` for Codex CLI).

3. Validate infrastructure connectivity:
   - For Vault endpoint, parse the scheme:
     - If `http://` or `https://`: test with `curl -sf <endpoint>/health`
     - If `tcp://`: extract host and port, test with Python (portable, works on macOS zsh and Linux):
       `python3 -c "import socket; s=socket.socket(); s.settimeout(10); s.connect(('<host>', <port>)); print('OK'); s.close()"`
       Do NOT use `bash -c 'echo > /dev/tcp/...'` — macOS `/bin/bash` may not support `/dev/tcp`.
     - Do NOT curl a `tcp://` endpoint.
   - Check MCP server is importable: `python3 -c "import mcp"` (try the project venv if available)

4. If all checks pass:
   - Update `state` to `"active"` in `~/.rune/config.json`
   - Call the `reload_pipelines` MCP tool to reinitialize pipelines without restarting
   - Respond: "Rune activated. Organizational memory is now online."

5. If checks fail:
   - Keep `state` as `"dormant"`
   - Show a detailed error report for each failed check
   - Suggest: `/rune:status` (or `$rune status` for Codex CLI) for more info

User input: {{input}}
"""
