description = "Set up Rune credentials and write ~/.rune/config.json"
prompt = """
You are configuring Rune, an FHE-encrypted organizational memory system.

Collect the following credentials from the user, one at a time:

1. **enVector Endpoint** (required) ‚Äî e.g. `cluster-abc123.envector.io`
2. **enVector API Key** (required) ‚Äî a base64url hash, e.g. `xK9mPqR2vLs-Tj7nWcYdF4b-hGe3iUoAZw1-Bx5kNrQyMa`
3. **Vault Endpoint** (optional) ‚Äî e.g. `tcp://vault-myteam.oci.envector.io:50051`
   - If the user enters a value without a scheme prefix (no `tcp://`, `http://`, or `https://`), auto-prepend `tcp://`.
4. **Vault Token** (optional) ‚Äî a base64url hash, e.g. `dG9rLWFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6MDEyMzQ1`

If Vault Endpoint and Token were both provided, ask the TLS question:

**"How does your Vault server handle TLS?"**

1. **Self-signed certificate** ‚Äî "My team uses a self-signed CA"
   - Follow-up: ask for the path to CA certificate PEM file
   - Support `~` expansion in the path
   - Copy to `~/.rune/certs/ca.pem` (`mkdir -p ~/.rune/certs && cp <user_path> ~/.rune/certs/ca.pem && chmod 600 ~/.rune/certs/ca.pem`)
   - If copy fails (file not found, permission denied), show error and ask again
   - Inform user: "CA certificate copied to ~/.rune/certs/ca.pem"
   ‚Üí config: `ca_cert: "~/.rune/certs/ca.pem"`, `tls_disable: false`

2. **Public CA (default)** ‚Äî "Vault uses a publicly-signed certificate (e.g., Let's Encrypt)"
   - No additional input needed, system CA handles verification
   ‚Üí config: `ca_cert: ""`, `tls_disable: false`

3. **No TLS** ‚Äî "Connect without TLS (not recommended)"
   - Show warning: "This should only be used for local development. All gRPC traffic will be sent in plaintext."
   ‚Üí config: `ca_cert: ""`, `tls_disable: true`

If Vault fields are skipped, note that the plugin will start in dormant state.

After collecting credentials, run these shell commands:

```
mkdir -p ~/.rune && chmod 700 ~/.rune
```

Then write `~/.rune/config.json` with this structure (chmod 600 after writing):

```json
{
  "vault": {"endpoint": "<vault_endpoint>", "token": "<vault_token>", "ca_cert": "<ca_cert or empty>", "tls_disable": false},
  "envector": {"endpoint": "<envector_endpoint>", "api_key": "<envector_api_key>"},
  "state": "dormant",
  "metadata": {"configVersion": "1.0", "lastUpdated": "<ISO timestamp>"}
}
```

If Vault fields were skipped, set their values to empty strings.

After writing the config, show a summary:

```
Rune Configuration Complete
============================
  Config    : ~/.rune/config.json
  Vault TLS : <enabled (system CA) | enabled (custom CA) | disabled>
  State     : dormant (run /rune:activate to enable)
```

If Vault was not configured, add: "Vault not configured ‚Äî plugin will start in dormant state."

User input: {{input}}
"""
