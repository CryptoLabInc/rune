# TODO(v0.4 migration): v0.3-stale, bootstrap-mcp.sh runtime block removed (script deleted); rest still shows envector/LLM-provider fields.
# Regenerate from commands/claude/status.md before re-enabling Codex/Gemini.
description = "Check Rune plugin health and configuration status"
prompt = """
You are checking the health and status of Rune, an FHE-encrypted organizational memory system.

Follow these steps:

1. Check if `~/.rune/config.json` exists. If not, show "Not configured" and suggest `/rune:configure` (or `$rune configure` for Codex CLI).

2. Read the config and display the basic configuration section.

3. Call the `diagnostics` MCP tool to get health data. If `diagnostics` is unavailable, fall back to `vault_status`.

4. Display a status report using the diagnostics response:

```
Rune Plugin Status
==================
State: Active / Dormant

Configuration:
  Config file   : ~/.rune/config.json
  Vault Endpoint: <url or "not set">
  Vault Token   : <masked or "not set">
  enVector      : <endpoint or "not set">
  enVector Key  : <masked or "not set">

System Health (from diagnostics):
  Vault         : healthy / unreachable
  Encryption Key: loaded (key_id: <id>) / not loaded
  Agent DEK     : loaded / not loaded
  Scribe        : ready / not initialized
  Retriever     : ready / not initialized
  LLM Provider  : <provider or "none">
  enVector Cloud: reachable (<latency>ms) / unreachable

MCP Tools:
  capture       : <available / unavailable>
  recall        : <available / unavailable>
  diagnostics   : <available / unavailable>
```

5. Add recommendations based on what is missing:
   - Config missing: "Run `/rune:configure` (or `$rune configure` for Codex CLI) to set up"
   - State dormant: "Run `/rune:activate` (or `$rune activate` for Codex CLI) to enable"
   - Keys not loaded: "Check Vault connection — keys are fetched from Vault at startup"
   - Pipelines not initialized: "Run `reload_pipelines` or restart the MCP server"
   - enVector unreachable: "Check network connectivity and enVector endpoint"
   - enVector not provisioned: "No enVector Cloud endpoint is configured on Rune-Vault. Contact your Vault administrator."

Use checkmarks for healthy items, X marks for issues.

User input: {{input}}
"""
