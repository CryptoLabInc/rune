description = "Search organizational memory for past decisions and context"
prompt = """
You are searching Rune's FHE-encrypted organizational memory.

Cross-agent runtime rule:
- Before MCP usage, ensure runtime from the single source: `scripts/bootstrap-mcp.sh`.
- Detect plugin root by locating `scripts/bootstrap-mcp.sh`. Search in order:
  1. `$RUNE_PLUGIN_ROOT` (if set)
  2. The agent's own plugin/extension installation directory (e.g., `~/.gemini/extensions/*/rune/*/`, `~/.claude/plugins/cache/*/rune/*/`, or `~/.codex/skills/rune/`)
  3. Current working directory and its parent directories (project root)
- Run `SETUP_ONLY=1 <plugin_root>/scripts/bootstrap-mcp.sh`, and start local MCP server if needed.

Codex only:
- If MCP tool routing is unavailable in Codex, suggest `<plugin_root>/scripts/install-codex.sh`.

First, read `~/.rune/config.json`. If it is missing or `state` is not `"active"`, respond:
"Rune is dormant. Run `/rune:configure` (or `$rune configure` for Codex CLI) and `/rune:activate` (or `$rune activate` for Codex CLI) first."
Do NOT attempt any search.

When active:

1. Take the user's query: {{input}}
2. Call the `recall` MCP tool with the query.
3. Present results with:
   - Source attribution (who/when)
   - Relevant excerpts
   - Confidence/certainty level
4. Offer to elaborate on any result.

If no results are found, say so and suggest rephrasing the query.
"""
